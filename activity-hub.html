<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跨境活动玩法库 — 全球电商平台活动收集站</title>
<style>
:root{--bg:#0a0c15;--card:#111522;--card2:#161b2e;--line:rgba(255,255,255,.06);--ink:#e4e7f0;--muted:#7a80a0;--accent:#5b7cff;--accent2:#a855f7;--accent3:#06b6d4;--red:#ef4444;--green:#22c55e;--amber:#f59e0b;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 0%,rgba(91,124,255,.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(168,85,247,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}

/* Hero */
.hero{position:relative;z-index:1;text-align:center;padding:48px 20px 32px}
.hero h1{font-size:40px;font-weight:800;background:linear-gradient(135deg,#5b7cff,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;letter-spacing:-1px}
.hero p{font-size:15px;color:var(--muted);max-width:720px;margin:0 auto;line-height:1.7}

/* Stats row */
.stats-row{position:relative;z-index:1;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;padding:0 20px 32px}
.stat-item{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 24px;text-align:center;min-width:120px}
.stat-item .val{font-size:28px;font-weight:800;background:linear-gradient(135deg,#5b7cff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-item .lbl{font-size:12px;color:var(--muted);margin-top:4px}

/* Filters */
.filters{position:relative;z-index:1;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:0 20px 28px}
.filters-search{position:relative;width:260px}
.filters-search input{width:100%;padding:10px 14px 10px 38px;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--ink);font-size:13px;outline:none;transition:border .2s}
.filters-search input:focus{border-color:var(--accent)}
.filters-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px}
.chip{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--muted);transition:all .2s;white-space:nowrap}
.chip:hover{color:var(--ink);border-color:rgba(255,255,255,.15)}
.chip.active{background:linear-gradient(135deg,rgba(91,124,255,.2),rgba(168,85,247,.2));border-color:var(--accent);color:#fff}
.chip.ongoing{border-color:rgba(34,197,94,.3);color:var(--green)}
.chip.ongoing.active{background:rgba(34,197,94,.15);border-color:var(--green)}
.chip.upcoming{border-color:rgba(245,158,11,.3);color:var(--amber)}
.chip.upcoming.active{background:rgba(245,158,11,.15);border-color:var(--amber)}

/* Timeline strip */
.timeline-strip{position:relative;z-index:1;padding:0 20px;margin-bottom:28px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.timeline-strip::-webkit-scrollbar{display:none}
.timeline-inner{display:flex;gap:8px;min-width:max-content}
.timeline-month{flex-shrink:0;padding:8px 20px;border-radius:10px;font-size:13px;font-weight:600;background:var(--card);border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.timeline-month:hover{color:var(--ink);border-color:rgba(255,255,255,.15)}
.timeline-month.active{background:linear-gradient(135deg,rgba(91,124,255,.2),rgba(168,85,247,.2));border-color:var(--accent);color:#fff}
.timeline-month.has-activity{position:relative}
.timeline-month.has-activity::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--accent)}
.timeline-month.has-ongoing::after{background:var(--green);box-shadow:0 0 8px var(--green)}

/* Region tabs */
.region-tabs{position:relative;z-index:1;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 20px 28px}
.region-tab{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:1.5px solid var(--line);background:var(--card);transition:all .2s;position:relative}
.region-tab:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px)}
.region-tab.active{border-color:var(--accent);box-shadow:0 0 16px rgba(91,124,255,.25);transform:translateY(-2px)}
.region-tab .dot{position:absolute;top:-4px;right:-4px;width:8px;height:8px;border-radius:50%;background:var(--accent)}

/* Main grid */
.main{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;padding:0 20px 60px;max-width:1400px;margin:0 auto}
@media(max-width:480px){.main{grid-template-columns:1fr}}

/* Card */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;transition:all .25s;cursor:default;position:relative;overflow:hidden}
.card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.card.amazon::before{background:linear-gradient(90deg,#FF9900,#e68a00)}
.card.shein::before{background:linear-gradient(90deg,#1a1a1a,#555)}
.card.homedepot::before{background:linear-gradient(90deg,#F96302,#e55a00)}
.card.temu::before{background:linear-gradient(90deg,#FB7701,#e03f00)}
.card.aliexpress::before{background:linear-gradient(90deg,#E62E04,#cc2903)}
.card.wayfair::before{background:linear-gradient(90deg,#7B189F,#5e1280)}
.card.lowes::before{background:linear-gradient(90deg,#004990,#003a73)}

/* Card header */
.card-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.card-avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0}
.card-title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.3}
.card-subtitle{font-size:12px;color:var(--muted)}

/* Status badge */
.status-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.5px;margin-left:auto;flex-shrink:0}
.status-tag.ongoing{background:rgba(34,197,94,.12);color:var(--green)}
.status-tag.upcoming{background:rgba(245,158,11,.12);color:var(--amber)}
.status-tag.past{background:rgba(255,255,255,.05);color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%}
.status-tag.ongoing .status-dot{background:var(--green);animation:pulse 1.5s infinite}
.status-tag.upcoming .status-dot{background:var(--amber)}
.status-tag.past .status-dot{background:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Card body */
.card-date{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-date svg{width:14px;height:14px;flex-shrink:0}
.card-desc{font-size:13px;color:#b0b6d0;line-height:1.65;margin-bottom:14px}
.card-mechanisms{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.mech-tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(91,124,255,.1);color:#8fa8ff;border:1px solid rgba(91,124,255,.15)}
.mech-tag.orange{background:rgba(251,119,1,.1);color:#fc962f;border-color:rgba(251,119,1,.15)}
.mech-tag.green{background:rgba(34,197,94,.1);color:#4ade80;border-color:rgba(34,197,94,.15)}
.mech-tag.purple{background:rgba(168,85,247,.1);color:#c084fc;border-color:rgba(168,85,247,.15)}
.mech-tag.pink{background:rgba(236,72,153,.1);color:#f472b6;border-color:rgba(236,72,153,.15)}
.mech-tag.cyan{background:rgba(6,182,212,.1);color:#22d3ee;border-color:rgba(6,182,212,.15)}

.card-steps{background:var(--card2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.7}
.card-steps strong{color:var(--ink)}
.card-steps ol{margin:0;padding-left:18px}
.card-steps ol li::marker{color:var(--accent);font-weight:700}

/* Card footer */
.card-foot{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.card-foot a{font-size:12px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:color .2s}
.card-foot a:hover{color:#8fa8ff}
.card-foot a svg{width:12px;height:12px}
.card-target{font-size:11px;color:var(--muted);margin-left:auto}

/* Empty */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty b{color:var(--ink)}

/* Detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--line);border-radius:20px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:32px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;background:var(--card2);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.modal-close:hover{color:var(--ink);border-color:rgba(255,255,255,.2)}
.modal h2{font-size:22px;font-weight:800;margin-bottom:6px}
.modal .modal-platform{font-size:13px;color:var(--muted);margin-bottom:16px}
.modal .modal-section{margin-bottom:20px}
.modal .modal-section h3{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.modal .modal-section p{font-size:13px;color:#b0b6d0;line-height:1.75}

/* Toast */
.toast{position:fixed;top:24px;right:24px;z-index:200;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 20px;font-size:13px;color:var(--ink);box-shadow:0 8px 30px rgba(0,0,0,.4);animation:slideIn .3s ease;display:flex;align-items:center;gap:10px}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* Footer note */
.foot-note{position:relative;z-index:1;text-align:center;padding:0 20px 40px;font-size:12px;color:var(--muted)}
.foot-note a{color:var(--accent);text-decoration:none}
</style>
</head>

function getStatus(act) {
  const now = new Date();
  const s = new Date(act.date);
  const e = act.endDate ? new Date(act.endDate) : null;
  if (now < s) return 'upcoming';
  if (e && now > new Date(e.getTime() + 86400000)) return 'past';
  if (!e && (now - s) > 7*86400000) return 'past';
  return 'ongoing';
}
function formatDate(d) { const dt=new Date(d+'T00:00:00'); return `${MONTHS[dt.getMonth()]}${dt.getDate()}日`; }
function getMonth(d) { return new Date(d+'T00:00:00').getMonth() + 1; }
function empty(main) { main.innerHTML = '<div class="empty">没有匹配的活动，试试换一个平台或状态筛选。<br>当前共 <b>'+ACTIVITIES.length+'</b> 条活动记录。</div>'; }

// ========== RENDER ==========
function renderStats() {
  const now = new Date();
  let ongoing=0, upcoming=0, past=0;
  ACTIVITIES.forEach(a=>{
    const st = getStatus(a);
    if(st==='ongoing') ongoing++;
    else if(st==='upcoming') upcoming++;
    else past++;
  });
  el('statsRow').innerHTML = `
    <div class="stat-item"><div class="val">${ACTIVITIES.length}</div><div class="lbl">收录活动</div></div>
    <div class="stat-item"><div class="val">${ongoing}</div><div class="lbl">🔥 进行中</div></div>
    <div class="stat-item"><div class="val">${upcoming}</div><div class="lbl">⏳ 即将开始</div></div>
    <div class="stat-item"><div class="val">${Object.keys(PLATFORMS).length}</div><div class="lbl">覆盖平台</div></div>
  `;
}

function renderTimeline() {
  const monthsWithOngoing = []; const monthsWithUpcoming = [];
  ACTIVITIES.forEach(a=>{
    const st = getStatus(a); const m = getMonth(a.date);
    if(st==='ongoing' && !monthsWithOngoing.includes(m)) monthsWithOngoing.push(m);
    if(st==='upcoming' && !monthsWithUpcoming.includes(m)) monthsWithUpcoming.push(m);
  });
  let html = '';
  MONTHS.forEach((m,i)=>{
    const mn = i+1;
    let cls = 'timeline-month';
    if(activeMonth === mn) cls += ' active';
    if(monthsWithOngoing.includes(mn)) cls += ' has-ongoing';
    else if(MONTHS_WITH_DATA.includes(mn)) cls += ' has-activity';
    html += `<div class="${cls}" data-month="${mn}">${m}</div>`;
  });
  el('timelineInner').innerHTML = html;
  document.querySelectorAll('.timeline-month').forEach(el=>{
    el.onclick = ()=>{
      activeMonth = activeMonth===parseInt(el.dataset.month) ? null : parseInt(el.dataset.month);
      renderTimeline();
      renderMain();
    };
  });
}

function renderRegionTabs() {
  let html = `<div class="region-tab ${activePlatform==='all'?'active':''}" data-platform="all" title="全部">🌍</div>`;
  Object.entries(PLATFORMS).forEach(([k,v])=>{
    html += `<div class="region-tab ${activePlatform===k?'active':''}" data-platform="${k}" title="${v.name}">${v.icon}</div>`;
  });
  el('regionTabs').innerHTML = html;
  document.querySelectorAll('.region-tab').forEach(tab=>{
    tab.onclick = ()=>{
      activePlatform = tab.dataset.platform;
      renderRegionTabs();
      renderMain();
    };
  });
}

function renderMain() {
  const kw = keyword.trim().toLowerCase();
  let list = ACTIVITIES.map(a=>({...a, _status:getStatus(a)}));

  if(activePlatform!=='all') list = list.filter(a=>a.platform===activePlatform);
  if(activeStatus!=='all') list = list.filter(a=>a._status===activeStatus);
  if(activeMonth) list = list.filter(a=>getMonth(a.date)===activeMonth);
  if(kw) list = list.filter(a=>
    a.name.toLowerCase().includes(kw) ||
    a.summary.toLowerCase().includes(kw) ||
    (PLATFORMS[a.platform]&&PLATFORMS[a.platform].name.toLowerCase().includes(kw)) ||
    a.mechanisms.some(m=>m.t.toLowerCase().includes(kw)) ||
    a.desc.toLowerCase().includes(kw) ||
    a.target.toLowerCase().includes(kw)
  );

  const main = el('main');
  if(list.length===0) return empty(main);

  main.innerHTML = list.map(a=>{
    const pf = PLATFORMS[a.platform];
    const st = a._status;
    const stLabel = st==='ongoing'?'进行中':st==='upcoming'?'即将开始':'已结束';
    const dateText = a.endDate ? `${formatDate(a.date)} — ${formatDate(a.endDate)}` : formatDate(a.date);

    return `<div class="card ${pf.cls}">
      <div class="card-head">
        <div class="card-avatar" style="background:${pf.color};color:${pf.dark?'#111':'#fff'}">${pf.icon}</div>
        <div>
          <div class="card-title">${a.name}</div>
          <div class="card-subtitle">${pf.name}</div>
        </div>
        <div class="status-tag ${st}"><span class="status-dot"></span>${stLabel}</div>
      </div>
      <div class="card-date"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${dateText}</div>
      <div class="card-desc">${a.summary}</div>
      <div class="card-mechanisms">${a.mechanisms.map(m=>`<span class="mech-tag ${m.c||''}">${m.t}</span>`).join('')}</div>
      <div class="card-steps">
        <strong>📋 玩法机制</strong>
        <ol>${a.steps.split('\n').filter(s=>s.trim()).map(s=>`<li>${s.replace(/^\d+\.\s*/,'')}</li>`).join('')}</ol>
      </div>
      <div class="card-foot">
        <a href="${a.url}" target="_blank" rel="noopener noreferrer">前往活动页 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
        <span class="card-target">🎯 ${a.target}</span>
      </div>
    </div>`;
  }).join('');
}

// ========== FILTER HANDLERS ==========
el('search').oninput = function(){ keyword=this.value; renderMain(); };

document.querySelectorAll('.chip').forEach(c=>{
  c.onclick = function(){
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    activeStatus = this.dataset.status;
    // When selecting a status, reset month
    if(activeStatus!=='all'){ activeMonth=null; renderTimeline(); }
    renderMain();
  };
});

// ========== INIT ==========
renderStats();
renderTimeline();
renderRegionTabs();
renderMain();

// Click card to open detail modal
el('main').addEventListener('click', function(e){
  const card = e.target.closest('.card');
  if(!card) return;
  if(e.target.closest('a')) return; // don't intercept link clicks
});
</script>
</body>
</html>
