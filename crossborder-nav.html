  body {

    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--line);
  }
  .hbar {
    max-width: 1280px; margin: 0 auto;
    padding: 14px 28px;
    display: flex; align-items: center; gap: 20px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 20px; letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--grad);
    display: grid; place-items: center;
    color: #fff; font-size: 18px; font-weight: 800;
    box-shadow: 0 6px 18px rgba(79,110,247,0.35);
  }
  .logo span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .search-wrap { flex: 1; max-width: 460px; position: relative; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); width:18px; height:18px; }
  #search {
    width: 100%; padding: 11px 16px 11px 42px;
    border: 1.5px solid var(--line); border-radius: 12px;
    font-size: 14px; outline: none; background: #fff;
    transition: border .2s, box-shadow .2s;
  }
  #search:focus { border-color: #7b5cff; box-shadow: 0 0 0 4px rgba(123,92,255,0.12); }
  .count {
    font-size: 13px; color: var(--muted); white-space: nowrap;
  }
  .count b { color: var(--ink); }

  /* Hero */
  .hero {
    max-width: 1280px; margin: 0 auto;
    padding: 52px 28px 28px;
    text-align: center;
  }
  .hero h1 {
    font-size: 42px; font-weight: 800; letter-spacing: -1px;
    line-height: 1.15; margin-bottom: 14px;
  }
  .hero h1 em { font-style: normal; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero p { font-size: 16px; color: var(--muted); max-width: 560px; margin: 0 auto; line-height: 1.6; }

  /* Region filter */
  .filters {
    max-width: 1280px; margin: 0 auto;
    padding: 8px 28px 24px;
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    position: sticky; top: 65px; z-index: 90;
    background: rgba(247,248,252,0.85);
    backdrop-filter: blur(10px);
    padding-top: 14px; padding-bottom: 14px;
  }
  .chip {
    padding: 7px 16px; border-radius: 20px;
    background: #fff; border: 1.5px solid var(--line);
    font-size: 13px; font-weight: 600; color: var(--muted);
    cursor: pointer; transition: all .2s; user-select: none;
  }
  .chip:hover { border-color: #b9c0f7; color: #4f6ef7; }
  .chip.active { background: var(--grad); color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(123,92,255,0.32); }

  /* Sections */
  main { max-width: 1280px; margin: 0 auto; padding: 0 28px 80px; }
  .section { margin-bottom: 44px; }
  .section-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px; padding-bottom: 12px;
    border-bottom: 1.5px solid var(--line);
  }
  .region-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 6px;
    background: var(--grad-soft); color: #4f6ef7;
    text-transform: uppercase;
  }
  .section-head h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
  .section-head .qty { font-size: 13px; color: var(--muted); margin-left: auto; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; padding: 18px;
    display: flex; flex-direction: column; gap: 10px;
    transition: transform .22s cubic-bezier(.2,.7,.3,1), box-shadow .22s, border-color .22s;
    text-decoration: none; color: inherit; position: relative; overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; inset: 0;
    background: var(--grad); opacity: 0; transition: opacity .22s;
    z-index: 0;
  }
  .card > * { position: relative; z-index: 1; }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(79,110,247,0.16);
    border-color: transparent;
  }
  .card-top { display: flex; align-items: center; gap: 12px; }
  .ic {

    display: grid; place-items: center;
    color: #fff; font-weight: 800; font-size: 18px;

  .card-top .loc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .desc { font-size: 12.5px; color: var(--muted); line-height: 1.5; flex: 1; }

    margin-top: 2px; letter-spacing: 0;

  .vpn-badge svg { width: 12px; height: 12px; }

    font-size: 12px; font-weight: 700; color: #4f6ef7;
    margin-top: 2px;
  }
  .go svg { width: 13px; height: 13px; transition: transform .2s; }
  .card:hover .go svg { transform: translateX(3px); }

    font-size: 11px; font-weight: 700; color: #7b5cff;
    background: #f3eeff; padding: 5px 10px; border-radius: 8px;

    text-decoration: none; border: none;

  .proxy-btn-card svg { width: 12px; height: 12px; }
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

  .fav-btn {
    position: absolute; top: 12px; right: 12px; z-index: 5;
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: rgba(255,255,255,.7); cursor: pointer;

  .fav-badge:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

  .empty { text-align: center; padding: 80px 20px; color: var(--muted); }

    .ic { width: 38px; height: 38px; font-size: 15px; }

const REGIONS = ["全部", "⭐ 收藏", "北美", "欧洲", "东南亚", "日韩", "印度", "拉美", "中东", "非洲", "俄罗斯", "中国出海"];
let activeRegion = "全部";
let keyword = "";

const main = document.getElementById("main");
const filters = document.getElementById("filters");
const totalEl = document.getElementById("total");
const searchEl = document.getElementById("search");

// Favorites
function getFavs() { try { return JSON.parse(localStorage.getItem('crossborder_favs') || '[]'); } catch(e) { return []; } }
function setFavs(arr) { localStorage.setItem('crossborder_favs', JSON.stringify(arr)); updateFavUI(); }
function isFav(url) { return getFavs().includes(url); }
function addFav(url) { if (!isFav(url)) { setFavs([...getFavs(), url]); } }
function removeFav(url) { setFavs(getFavs().filter(u => u !== url)); }
function toggleFav(url) { if (isFav(url)) removeFav(url); else addFav(url); render(); }
function updateFavUI() {
  const n = getFavs().length;
  document.getElementById('favCount').textContent = n;
}
function toggleFavFilter() {
  if (activeRegion !== "⭐ 收藏") {
    activeRegion = "⭐ 收藏";
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.chip').forEach(x => { if(x.textContent.includes("收藏")) x.classList.add('active'); });
  } else {
    activeRegion = "全部";
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.chip').forEach(x => { if(x.textContent === "全部") x.classList.add('active'); });
  }
  render();
}
updateFavUI();

// Render filters
REGIONS.forEach((r, i) => {
  const c = document.createElement("div");
  const isFavChip = r.includes("收藏");
  c.className = "chip" + (i === 0 ? " active" : "") + (isFavChip ? " chip-fav" : "");
  c.textContent = r;
  c.onclick = () => {
    document.querySelectorAll(".chip").forEach(x => x.classList.remove("active"));
    c.classList.add("active");
    activeRegion = r;
    render();
  };
  filters.appendChild(c);
});

function initials(name) {
  // 取主要首字母/前两字符
  const cleaned = name.replace(/[^A-Za-z0-9\u4e00-\u9fa5]/g, " ").trim();
  const parts = cleaned.split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return parts[0].slice(0, 2).toUpperCase();
}

function render() {
  const kw = keyword.trim().toLowerCase();
  const favUrls = getFavs();
  const filtered = DATA.filter(p => {
    const regionOk = activeRegion === "全部" || (activeRegion === "⭐ 收藏" ? favUrls.includes(p.url) : p.region === activeRegion);
    const kwOk = !kw || p.name.toLowerCase().includes(kw) || p.loc.toLowerCase().includes(kw) || p.region.toLowerCase().includes(kw) || p.desc.toLowerCase().includes(kw);
    return regionOk && kwOk;
  });
  totalEl.textContent = filtered.length;

  if (filtered.length === 0) {
    if (activeRegion === "⭐ 收藏") {
      main.innerHTML = `<div class="empty">还没有收藏任何平台。<br>点击卡片右上角的 ❤ 添加收藏！</div>`;
    } else {
      main.innerHTML = `<div class="empty">没有找到匹配的平台，试试别的关键词？<br>当前共 <b>${DATA.length}</b> 个平台可访问。</div>`;
    }
    return;
  }

  // 按区域分组
  const groups = {};
  filtered.forEach(p => { (groups[p.region] = groups[p.region] || []).push(p); });
  const order = REGIONS.filter(r => r !== "全部");
  order.sort((a,b) => {
    // 让活跃区域排前面
    if (a === activeRegion) return -1;
    if (b === activeRegion) return 1;
    return 0;
  });

  let html = "";
  order.forEach(region => {
    if (!groups[region]) return;
    const list = groups[region];
    html += `<div class="section"><div class="section-head">
      <span class="region-tag">${region}</span>
      <h2>${region}平台</h2>
      <span class="qty">${list.length} 个</span>
    </div><div class="grid">`;
    list.forEach(p => {
      const txtColor = p.dark ? "#1a1f36" : "#fff";
      const vpnBadge = p.vpn ? `<span class="vpn-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>需VPN</span>` : '';
      const proxyBtn = p.vpn ? `<a class="proxy-btn-card" href="proxy.html?url=${encodeURIComponent(p.url)}&name=${encodeURIComponent(p.name)}" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/></svg>云端浏览</a>` : '';
      const directBtn = `<span class="go">访问买家端 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>`;
      const actions = p.vpn ? `<div class="card-actions">${directBtn}${proxyBtn}</div>` : directBtn;
      const favd = isFav(p.url);
      html += `<a class="card" href="${p.url}" target="_blank" rel="noopener noreferrer">
        <button class="fav-btn${favd ? ' active' : ''}" onclick="event.preventDefault();event.stopPropagation();toggleFav('${p.url}')" title="${favd ? '取消收藏' : '添加收藏'}">
          <svg viewBox="0 0 24 24" fill="${favd ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <div class="card-top">
          <div class="ic" style="background:${p.color};color:${txtColor}">${initials(p.name)}</div>
          <div>
            <h3>${p.name}</h3>
            <div class="loc">${p.loc} ${vpnBadge}</div>
          </div>
        </div>
        <div class="desc">${p.desc}</div>
        ${actions}
      </a>`;
    });
    html += `</div></div>`;
  });
  main.innerHTML = html;
}

searchEl.addEventListener("input", e => { keyword = e.target.value; render(); });
render();
</script>
