<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云端浏览器 · 跨境通</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--grad:linear-gradient(135deg,#4f6ef7 0%,#7b5cff 50%,#b14ff7 100%);--ink:#1a1f36;--muted:#6b7280;--line:#eceef3;--bg:#f7f8fc}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}

/* Top bar */
.bar{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:8px 16px;display:flex;align-items:center;gap:12px;font-size:13px}
.bar a{color:#4f6ef7;font-weight:700;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.bar a svg{width:15px;height:15px}
.bar .target{font-size:18px;font-weight:800;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar .target span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Tabs */
.tabs{position:sticky;top:53px;z-index:190;background:#fff;border-bottom:2px solid var(--line);display:flex;padding:0 20px;gap:4px;overflow-x:auto}
.tab{padding:10px 20px;border:none;background:none;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:#4f6ef7}
.tab.active{color:#4f6ef7;border-bottom-color:#4f6ef7}

/* Content area */
.content{max-width:1100px;margin:0 auto;padding:24px}

/* Screenshot tab */
.screenshot-section{text-align:center}
.screenshot-wrap{border-radius:12px;overflow:hidden;border:1px solid var(--line);box-shadow:0 4px 24px rgba(0,0,0,.06)}
.screenshot-wrap img{width:100%;display:block;background:#fff}
.screenshot-controls{display:flex;align-items:center;gap:8px;justify-content:center;margin:16px 0}
.ctrl-btn{padding:8px 16px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;transition:all .15s}
.ctrl-btn:hover{border-color:#7b5cff;color:#4f6ef7;background:#f8f9ff}
.ctrl-btn.primary{background:var(--grad);color:#fff;border-color:transparent}
.zoom-info{font-size:12px;font-weight:700;color:var(--muted);min-width:44px;text-align:center}
.screenshot-note{margin-top:16px;font-size:12px;color:var(--muted)}

/* Data section */
.data-section{display:none}
.data-section.active{display:block}
.data-card{background:#fff;border-radius:16px;border:1px solid var(--line);padding:28px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.03)}
.data-card h2{font-size:22px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.data-card h2 .icon{font-size:26px}
.data-card p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:12px}
.cat-item{padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);text-align:center;font-size:13px;font-weight:600;transition:all .15s;cursor:default}
.cat-item:hover{border-color:#7b5cff;color:#4f6ef7;background:#f8f9ff}
.cat-item .count{font-size:11px;color:var(--muted);font-weight:400;display:block;margin-top:2px}

/* Product list */
.prod-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:16px}
.prod-item{border:1.5px solid var(--line);border-radius:12px;padding:16px;transition:all .15s}
.prod-item:hover{border-color:#7b5cff;box-shadow:0 4px 12px rgba(123,92,255,.1)}
.prod-name{font-size:13px;font-weight:600;line-height:1.45;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-price{font-size:18px;font-weight:800;color:#ef4444}
.prod-meta{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--muted)}
.prod-meta span{display:inline-flex;align-items:center;gap:3px}
.tag-hot{display:inline-block;background:#fef2f2;color:#ef4444;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:6px}

/* Info boxes */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:12px}
.info-box{padding:16px;border-radius:12px;border:1.5px solid var(--line);background:#fafbff}
.info-box .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.info-box .value{font-size:16px;font-weight:800;color:var(--ink);margin-top:4px}

/* No data placeholder */
.no-data{padding:40px;text-align:center;color:var(--muted)}
.no-data svg{width:48px;height:48px;stroke:var(--line);margin-bottom:12px}

/* Footer note */
.foot-bar{background:#fefce8;border:1.5px solid #fde68a;border-radius:12px;padding:16px 20px;margin-top:24px;font-size:13px;color:#92400e;line-height:1.6}
.foot-bar b{color:#78350f}
</style>
</head>
<body>

<div class="bar">

  throw new Error('No URL');
}

document.getElementById('siteName').textContent = siteName || targetUrl;
document.getElementById('directLink').href = targetUrl;

const plat = PLATFORMS[targetUrl];

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('screenTab').style.display = 'none';
    document.getElementById('dataTab').classList.remove('active');
    document.getElementById('aboutTab').classList.remove('active');
    if (tab.dataset.tab === 'screen') document.getElementById('screenTab').style.display = 'block';
    else if (tab.dataset.tab === 'data') document.getElementById('dataTab').classList.add('active');
    else if (tab.dataset.tab === 'about') renderAbout();
  };
});

// Zoom controls
function zoom(dir) {
  if (dir === 0) currentZoom = 100;
  else currentZoom = Math.max(50, Math.min(250, currentZoom + dir * 10));
  document.getElementById('zoomInfo').textContent = currentZoom + '%';
  const img = document.getElementById('screenImg');
  if (img) img.style.transform = `scale(${currentZoom/100})`;
}

// Load screenshot
function loadScreen() {
  const img = document.getElementById('screenImg');
  if (plat && plat.img) {
    img.src = plat.img;
    img.style.transform = 'scale(1)';
    currentZoom = 100;
  } else {
    document.querySelector('.screenshot-section').innerHTML =
      '<div class="no-data"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 21-4.3-4.3"/></svg><h3>暂无缓存截图</h3><p>该平台尚未预缓存截图</p></div>';
  }
}

// Render data tab
function renderData() {
  if (!plat) {
    document.getElementById('dataTab').innerHTML = '<div class="no-data">暂无数据</div>';
    return;
  }

  let html = '';

  // Categories card
  html += `<div class="data-card"><h2><span class="icon">🏷️</span> 商品分类 (${plat.categories.length}个)</h2>`;
  html += `<div class="cat-grid">${plat.categories.map(c =>
    `<div class="cat-item">${c.name}<span class="count">${c.count}</span></div>`
  ).join('')}</div></div>`;

  // Products card
  if (plat.products) {
    html += `<div class="data-card"><h2><span class="icon">🔥</span> 热门商品 / 活动优惠 (${plat.products.length}条)</h2>`;
    html += `<div class="prod-list">${plat.products.map(p =>
      `<div class="prod-item">
        <div class="prod-name">${p.name}${p.hot ? '<span class="tag-hot">HOT</span>' : ''}</div>
        <div class="prod-price">${p.price}${p.was ? `<span style="font-size:13px;color:#999;text-decoration:line-through;margin-left:8px;font-weight:400">${p.was}</span>` : ''}</div>
        <div class="prod-meta">
          ${p.sold ? `<span>📦 ${p.sold} 已售</span>` : ''}
          ${p.reviews ? `<span>⭐ ${p.reviews} 评价</span>` : ''}
          ${p.tag ? `<span style="color:#7b5cff;font-weight:700">#${p.tag}` : ''}
        </div>
      </div>`
    ).join('')}</div></div>`;
  }

  // Platform stats
  if (plat.about) {
    html += `<div class="data-card"><h2><span class="icon">📈</span> 平台关键指标</h2>`;
    html += `<div class="info-grid">`;
    const stats = [
      {label:'成立时间', value:plat.about.founded},
      {label:'总部位置', value:plat.about.headquarters},
      {label:'主要市场', value:plat.about.mainMarkets},
      {label:'GMV规模', value:plat.about.gmv},
      {label:'卖家数量', value:plat.about.sellerCount || plat.about.stores || '-'},
      {label:'品类覆盖', value:plat.about.categories}
    ];
    stats.forEach(s => {
      html += `<div class="info-box"><div class="label">${s.label}</div><div class="value">${s.value}</div></div>`;
    });
    html += '</div></div>';
  }

  document.getElementById('dataTab').innerHTML = html;
}

// Render about tab

        <div class="info-box"><div class="label">成立年份</div><div class="value">${a.founded}</div></div>
        <div class="info-box"><div class="label">总部</div><div class="value">${a.headquarters}</div></div>

    </div>
    <div class="foot-bar">
      <b>💡 选品建议：</b>${plat.name} 是 ${plat.url.includes('shein') ? '快时尚出海标杆，适合做服装、配饰、家居类目选品' :
        plat.url.includes('temu') ? '极致性价比平台，适合做白牌商品、日用品、小商品选品' :
        plat.url.includes('homedepot') ? '北美家居建材第一站，适合做工具、建材、园艺类目选品' :
        '内容电商新星，适合做短视频种货品类的选品'}。
      数据更新时间：2026-06-30 · 截图和数据均由海外服务器获取并缓存至本站。
    </div>`;
  }
  document.getElementById('aboutTab').classList.add('active');
}

// Init
loadScreen();
renderData();

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === '1') document.querySelectorAll('.tab')[0].click();
  if (e.key === '2') document.querySelectorAll('.tab')[1].click();
  if (e.key === '3') document.querySelectorAll('.tab')[2].click();
});
</script>
