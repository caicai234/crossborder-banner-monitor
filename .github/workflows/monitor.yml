name: Banner Daily Monitor

on:
  schedule:
    # 每 12 小时检测一次（北京时间早 8:00 / 晚 20:00）
    - cron: '0 */12 * * *'  # UTC 00:00 / 12:00 = 北京时间 08:00 / 20:00
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write          # 允许推送提交

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 运行 Banner 图片级检测
        run: node check-banners.js
        env:
          TZ: Asia/Shanghai

      - name: 提交并推送检测结果
        run: |
          git config --global user.name "Banner Monitor Bot"
          git config --global user.email "monitor-bot@banner.local"

          # 检查 results.json 是否有变化
          if [ -f "monitor-server/data/results.json" ]; then
            git add monitor-server/data/results.json

            if git diff --cached --quiet; then
              echo "📊 无数据变化，跳过推送"
            else
              git commit -m "📊 Banner 监控数据更新 [$(date '+%Y-%m-%d %H:%M')] CST"
              git push origin main
              echo "✅ 数据已推送到仓库"
            fi
          else
            echo "⚠️ results.json 未生成"
            exit 1
          fi
