name: Banner Daily Monitor

on:
  schedule:
    # 每天北京时间凌晨 2:00 和下午 2:00 各检测一次
    - cron: '0 18 * * *'   # UTC 18:00 = 北京时间凌晨 2:00
    - cron: '0 6 * * *'    # UTC 06:00 = 北京时间下午 2:00
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write          # 允许推送提交

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 运行 Banner 检测
        run: node check-once-cloud.js
        env:
          TZ: Asia/Shanghai

      - name: 提交并推送检测结果
        run: |
          git config --global user.name "Banner Monitor Bot"
          git config --global user.email "monitor-bot@banner.local"

          # 检查 results.json 是否有变化
          if [ -f "monitor-server/data/results.json" ]; then
            git add monitor-server/data/results.json
            # 如果截图目录有文件也加入
            if [ -d "monitor-server/data/screenshots" ]; then
              git add monitor-server/data/screenshots/
            fi

            if git diff --cached --quiet; then
              echo "📊 无数据变化，跳过推送"
            else
              git commit -m "📊 Banner 监控数据更新 [$(date '+%Y-%m-%d %H:%M') CST]"
              git push origin main
              echo "✅ 数据已推送到仓库"
            fi
          else
            echo "⚠️ results.json 未生成"
            exit 1
          fi
